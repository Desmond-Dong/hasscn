name: Build Site

on:
  push:
    branches-ignore:
      - site-build
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-build-deploy
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Clean tracked dependencies
        run: |
          rm -rf node_modules doc_build
          git clean -fdx node_modules || true

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npx rspress build

      - name: Upload build output artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: doc-build
          path: doc_build

      - name: Publish build output to site-build branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc_build
          publish_branch: site-build
          force_orphan: true
          enable_jekyll: false
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: 'build: publish latest site output'
